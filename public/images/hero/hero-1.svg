<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="900" viewBox="0 0 1920 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a15"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,229,255,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1920" height="900" fill="url(#bg)"/>
  <rect width="1920" height="900" fill="url(#grid)"/>
  <!-- Factory silhouette -->
  <g opacity="0.15" fill="#00e5ff">
    <rect x="200" y="400" width="120" height="500" rx="2"/>
    <rect x="350" y="300" width="80" height="600" rx="2"/>
    <rect x="460" y="350" width="100" height="550" rx="2"/>
    <rect x="600" y="250" width="60" height="650" rx="2"/>
    <polygon points="700,450 900,300 900,450"/>
    <rect x="900" y="300" width="200" height="600" rx="2"/>
    <rect x="1150" y="380" width="150" height="520" rx="2"/>
    <rect x="1350" y="320" width="80" height="580" rx="2"/>
    <rect x="1480" y="400" width="120" height="500" rx="2"/>
    <!-- Smokestacks -->
    <rect x="230" y="300" width="30" height="100" rx="2"/>
    <rect x="380" y="180" width="20" height="120" rx="2"/>
    <rect x="620" y="130" width="20" height="120" rx="2"/>
  </g>
  <!-- Circuit lines -->
  <g stroke="rgba(0,229,255,0.1)" fill="none" stroke-width="1">
    <path d="M0,450 L400,450 L450,400 L800,400 L850,450 L1200,450 L1250,400 L1920,400"/>
    <path d="M0,500 L300,500 L350,550 L700,550 L750,500 L1100,500 L1150,550 L1920,550"/>
  </g>
  <!-- Data nodes -->
  <g fill="#00e5ff" opacity="0.3">
    <circle cx="450" cy="400" r="4"/>
    <circle cx="850" cy="450" r="4"/>
    <circle cx="1250" cy="400" r="4"/>
    <circle cx="350" cy="550" r="4"/>
    <circle cx="750" cy="500" r="4"/>
    <circle cx="1150" cy="550" r="4"/>
  </g>
</svg>
