<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="900" viewBox="0 0 1920 900">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1120"/>
      <stop offset="100%" style="stop-color:#050a15"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="900" fill="url(#bg2)"/>
  <!-- Abstract neural network -->
  <g stroke="rgba(0,229,255,0.08)" fill="none" stroke-width="0.8">
    <line x1="400" y1="200" x2="700" y2="350"/>
    <line x1="700" y1="350" x2="1000" y2="250"/>
    <line x1="1000" y1="250" x2="1300" y2="400"/>
    <line x1="1300" y1="400" x2="1600" y2="300"/>
    <line x1="500" y1="500" x2="800" y2="400"/>
    <line x1="800" y1="400" x2="1100" y2="550"/>
    <line x1="1100" y1="550" x2="1400" y2="450"/>
    <line x1="300" y1="650" x2="600" y2="500"/>
    <line x1="600" y1="500" x2="900" y2="650"/>
    <line x1="900" y1="650" x2="1200" y2="500"/>
    <line x1="1200" y1="500" x2="1500" y2="650"/>
    <!-- Cross connections -->
    <line x1="700" y1="350" x2="800" y2="400"/>
    <line x1="1000" y1="250" x2="1100" y2="550"/>
    <line x1="600" y1="500" x2="700" y2="350"/>
    <line x1="1200" y1="500" x2="1300" y2="400"/>
  </g>
  <!-- Nodes -->
  <g fill="#00e5ff">
    <circle cx="400" cy="200" r="6" opacity="0.4"/>
    <circle cx="700" cy="350" r="8" opacity="0.5"/>
    <circle cx="1000" cy="250" r="6" opacity="0.4"/>
    <circle cx="1300" cy="400" r="8" opacity="0.5"/>
    <circle cx="1600" cy="300" r="5" opacity="0.3"/>
    <circle cx="500" cy="500" r="5" opacity="0.3"/>
    <circle cx="800" cy="400" r="7" opacity="0.45"/>
    <circle cx="1100" cy="550" r="7" opacity="0.45"/>
    <circle cx="1400" cy="450" r="5" opacity="0.3"/>
    <circle cx="300" cy="650" r="5" opacity="0.3"/>
    <circle cx="600" cy="500" r="7" opacity="0.45"/>
    <circle cx="900" cy="650" r="6" opacity="0.4"/>
    <circle cx="1200" cy="500" r="7" opacity="0.45"/>
    <circle cx="1500" cy="650" r="5" opacity="0.3"/>
  </g>
  <!-- Glow effect on key nodes -->
  <g fill="none" stroke="#00e5ff" opacity="0.15">
    <circle cx="700" cy="350" r="20"/>
    <circle cx="1100" cy="550" r="20"/>
    <circle cx="800" cy="400" r="16"/>
  </g>
</svg>
